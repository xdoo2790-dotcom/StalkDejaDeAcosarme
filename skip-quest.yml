name: Skip Clan Quest

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  skip-quest:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Skip clan quest
        run: npm start
